<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Library</title>
		<link rel="stylesheet" href="style.css">
		<script type="module" src="szcript.js"></script>
	</head>
	<body>
		<header>
			<p class="logo">Bookly</p>
			<button class="add-button">Add New</button>
		</header>
		<main>
			<div class="reading-status">
				<div class="list willread">
					<p>TO READ</p>
					<div class="to-read-list" ondragover="allowDrop(event)" ondrop="drop(event)">

					</div>
				</div>
				<div class="list readingnow">
					<p>READING</p>
					<div class="reading-list" ondragover="allowDrop(event)" ondrop="drop(event)">

					</div>
				</div>
				<div class="list haveread">
					<p>READ</p>
					<div class="read-list" ondragover="allowDrop(event)" ondrop="drop(event)">

					</div>
				</div>
			</div>
		</main>
		<footer>
			<div>View Code on <a href="https://github.com">Github</a></div>
		</footer>
	</body>
</html>
